<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNN vs 標準NN 3D物理比較デモ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #111827;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .label {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.875rem;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body class="text-white">

    <!-- メインレイアウト -->
    <div class="flex flex-col h-screen p-4">
        <!-- ヘッダー -->
        <div class="text-center mb-4">
            <h1 class="text-2xl md:text-3xl font-bold text-cyan-400">HNN vs 標準NN 3D物理比較</h1>
            <p class="text-gray-400 text-sm md:text-base">物理法則（エネルギー保存）の学習がもたらす安定性の違い</p>
        </div>

        <!-- 3Dビューポートグリッド -->
        <div class="flex-grow grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <!-- 左：標準NN (不安定) -->
            <div class="canvas-container bg-gray-900 border border-red-900/30">
                <div class="label bg-red-500/80 text-white">標準的なNN (物理法則の考慮なし)</div>
                <div id="nnViewport" class="w-full h-full"></div>
            </div>

            <!-- 右：HNN (安定) -->
            <div class="canvas-container bg-gray-900 border border-green-900/30">
                <div class="label bg-green-500/80 text-white">HNNベース (物理法則を構造的に学習)</div>
                <div id="hnnViewport" class="w-full h-full"></div>
            </div>
        </div>

        <!-- 操作説明と情報 -->
        <div class="bg-gray-800/80 p-4 rounded-xl border border-gray-700 backdrop-blur-md flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex gap-4 items-center">
                <kbd class="px-3 py-1 bg-gray-700 rounded border border-gray-600 font-bold">W</kbd>
                <kbd class="px-3 py-1 bg-gray-700 rounded border border-gray-600 font-bold">A</kbd>
                <kbd class="px-3 py-1 bg-gray-700 rounded border border-gray-600 font-bold">S</kbd>
                <kbd class="px-3 py-1 bg-gray-700 rounded border border-gray-600 font-bold">D</kbd>
                <span class="text-gray-300 text-sm">キーでキャラクターを移動。激しく動かして比較してください。</span>
            </div>
            <button onclick="resetSystems()" class="px-6 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg font-bold transition-colors">
                位置をリセット
            </button>
        </div>
    </div>

    <!-- Three.js ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * 物理パラメータ
         */
        const PARAMS = {
            gravity: new THREE.Vector3(0, -9.8, 0),
            dt: 0.016, // フレームレート (60fps)
            particles: 12, // マフラーの節の数
            length: 0.3, // 節ごとの長さ
            stiffness: 150, // 硬さ
            moveSpeed: 8.0
        };

        let nnScene, hnnScene, nnCamera, hnnCamera, nnRenderer, hnnRenderer;
        let nnChar, hnnChar, nnPhysics, hnnPhysics;
        const keys = {};

        /**
         * 物理パーティクルクラス
         */
        class Particle {
            constructor(x, y, z, isPinned = false) {
                this.pos = new THREE.Vector3(x, y, z);
                this.oldPos = new THREE.Vector3(x, y, z);
                this.vel = new THREE.Vector3(0, 0, 0);
                this.acc = new THREE.Vector3(0, 0, 0);
                this.isPinned = isPinned;
                this.mass = 0.2;
            }
        }

        /**
         * マフラー物理管理クラス
         */
        class ScarfSystem {
            constructor(type, character, scene, color) {
                this.type = type; // 'nn' (標準NN) か 'hnn' (HNN)
                this.character = character;
                this.particles = [];
                this.constraints = [];

                // 粒子の生成
                for (let i = 0; i < PARAMS.particles; i++) {
                    const p = new Particle(0, 3 - i * PARAMS.length, 0.4, i === 0);
                    this.particles.push(p);
                    if (i > 0) {
                        this.constraints.push({ p1: this.particles[i-1], p2: this.particles[i], target: PARAMS.length });
                    }
                }

                // 表示用メッシュの作成
                const geometry = new THREE.BufferGeometry();
                const material = new THREE.LineBasicMaterial({ color: color, linewidth: 4 });
                this.line = new THREE.Line(geometry, material);
                scene.add(this.line);

                this.updateGeometry();
            }

            // ジオメトリ（見た目）の更新
            updateGeometry() {
                const positions = new Float32Array(this.particles.length * 3);
                for (let i = 0; i < this.particles.length; i++) {
                    positions[i*3] = this.particles[i].pos.x;
                    positions[i*3+1] = this.particles[i].pos.y;
                    positions[i*3+2] = this.particles[i].pos.z;
                }
                this.line.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                this.line.geometry.attributes.position.needsUpdate = true;
            }

            // 物理シミュレーションの更新
            update() {
                // 先頭を首に固定
                const neckPos = this.character.position.clone().add(new THREE.Vector3(0, 2.8, 0.4));
                this.particles[0].pos.copy(neckPos);

                if (this.type === 'nn') {
                    this.updateEuler(); // 標準NN (不安定なオイラー積分を模擬)
                } else {
                    this.updateVerlet(); // HNN (安定したVerlet積分/ハミルトン系を模擬)
                }
                this.updateGeometry();
            }

            // 物理法則を知らないNNをシミュレート (オイラー法)
            // 誤差が蓄積しやすく、激しい動きでマフラーが伸びたり震えたりする
            updateEuler() {
                for (let p of this.particles) {
                    if (p.isPinned) continue;
                    p.acc.copy(PARAMS.gravity);
                }

                // ばね拘束の計算
                for (let c of this.constraints) {
                    const diff = new THREE.Vector3().subVectors(c.p2.pos, c.p1.pos);
                    const dist = diff.length() || 0.001;
                    const error = (dist - c.target) / dist;
                    const force = diff.multiplyScalar(error * PARAMS.stiffness);
                    if (!c.p1.isPinned) c.p1.acc.add(force);
                    if (!c.p2.isPinned) c.p2.acc.sub(force);
                }

                // 積分
                for (let p of this.particles) {
                    if (p.isPinned) continue;
                    p.vel.add(p.acc.multiplyScalar(PARAMS.dt));
                    p.pos.add(p.vel.clone().multiplyScalar(PARAMS.dt));
                    
                    // 地面衝突
                    if (p.pos.y < 0) {
                        p.pos.y = 0;
                        p.vel.y *= -0.2;
                    }
                }
            }

            // HNNをシミュレート (Verlet法 + 強力な拘束解決)
            // エネルギー保存を前提とした構造のため、どんな動きでもマフラーの長さが一定に保たれる
            updateVerlet() {
                for (let p of this.particles) {
                    if (p.isPinned) continue;
                    const vel = new THREE.Vector3().subVectors(p.pos, p.oldPos);
                    p.oldPos.copy(p.pos);
                    p.pos.add(vel).add(PARAMS.gravity.clone().multiplyScalar(PARAMS.dt * PARAMS.dt));
                }

                // 拘束の解決 (繰り返し計算で長さを厳密に守る)
                for (let step = 0; step < 8; step++) {
                    for (let c of this.constraints) {
                        const diff = new THREE.Vector3().subVectors(c.p2.pos, c.p1.pos);
                        const dist = diff.length() || 0.001;
                        const error = (c.target - dist) / dist;
                        const offset = diff.multiplyScalar(error * 0.5);
                        if (!c.p1.isPinned) c.p1.pos.sub(offset);
                        if (!c.p2.isPinned) c.p2.pos.add(offset);
                    }
                }

                for (let p of this.particles) {
                    if (p.pos.y < 0) p.pos.y = 0;
                }
            }

            reset() {
                const neckPos = this.character.position.clone().add(new THREE.Vector3(0, 2.8, 0.4));
                for(let i=0; i<this.particles.length; i++) {
                    this.particles[i].pos.set(neckPos.x, neckPos.y - i * PARAMS.length, neckPos.z);
                    this.particles[i].oldPos.copy(this.particles[i].pos);
                    this.particles[i].vel.set(0,0,0);
                }
            }
        }

        /**
         * シーンの初期設定
         */
        function setupScene(containerId) {
            const container = document.getElementById(containerId);
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            scene.fog = new THREE.Fog(0x0f172a, 10, 40);

            const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 4, 10);
            camera.lookAt(0, 2, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 照明
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            const spot = new THREE.DirectionalLight(0xffffff, 0.8);
            spot.position.set(5, 10, 5);
            scene.add(spot);

            // 床
            const grid = new THREE.GridHelper(50, 50, 0x334155, 0x1e293b);
            scene.add(grid);
            const plane = new THREE.Mesh(
                new THREE.PlaneGeometry(50, 50),
                new THREE.MeshStandardMaterial({ color: 0x111827, side: THREE.DoubleSide })
            );
            plane.rotation.x = Math.PI / 2;
            scene.add(plane);

            return { scene, camera, renderer };
        }

        /**
         * キャラクター（人形）の作成
         */
        function createMannequin(scene, color) {
            const group = new THREE.Group();
            
            // 体
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.4), new THREE.MeshStandardMaterial({ color }));
            torso.position.y = 1.8;
            group.add(torso);
            
            // 頭
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color }));
            head.position.y = 2.9;
            group.add(head);

            // 足
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.1, 0.3), new THREE.MeshStandardMaterial({ color }));
            legR.position.set(0.2, 0.55, 0);
            group.add(legR);
            const legL = legR.clone();
            legL.position.x = -0.2;
            group.add(legL);

            scene.add(group);
            return group;
        }

        /**
         * システムリセット
         */
        window.resetSystems = function() {
            nnChar.position.set(0, 0, 0);
            hnnChar.position.set(0, 0, 0);
            nnPhysics.reset();
            hnnPhysics.reset();
        };

        /**
         * メイン初期化
         */
        function init() {
            const nnObj = setupScene('nnViewport');
            nnScene = nnObj.scene; nnCamera = nnObj.camera; nnRenderer = nnObj.renderer;
            
            const hnnObj = setupScene('hnnViewport');
            hnnScene = hnnObj.scene; hnnCamera = hnnObj.camera; hnnRenderer = hnnObj.renderer;

            nnChar = createMannequin(nnScene, 0xef4444);
            hnnChar = createMannequin(hnnScene, 0x10b981);

            nnPhysics = new ScarfSystem('nn', nnChar, nnScene, 0xf87171);
            hnnPhysics = new ScarfSystem('hnn', hnnChar, hnnScene, 0x34d399);

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', onResize);

            animate();
        }

        function onResize() {
            const nnCont = document.getElementById('nnViewport');
            nnCamera.aspect = nnCont.clientWidth / nnCont.clientHeight;
            nnCamera.updateProjectionMatrix();
            nnRenderer.setSize(nnCont.clientWidth, nnCont.clientHeight);

            const hnnCont = document.getElementById('hnnViewport');
            hnnCamera.aspect = hnnCont.clientWidth / hnnCont.clientHeight;
            hnnCamera.updateProjectionMatrix();
            hnnRenderer.setSize(hnnCont.clientWidth, hnnCont.clientHeight);
        }

        /**
         * ループ
         */
        function animate() {
            requestAnimationFrame(animate);

            // 入力処理
            const dir = new THREE.Vector3(0, 0, 0);
            if (keys['KeyW']) dir.z -= 1;
            if (keys['KeyS']) dir.z += 1;
            if (keys['KeyA']) dir.x -= 1;
            if (keys['KeyD']) dir.x += 1;

            if (dir.lengthSq() > 0) {
                dir.normalize().multiplyScalar(PARAMS.moveSpeed * PARAMS.dt);
                nnChar.position.add(dir);
                hnnChar.position.add(dir);
                
                // カメラを追従
                const camOffset = new THREE.Vector3(0, 4, 10);
                nnCamera.position.copy(nnChar.position).add(camOffset);
                nnCamera.lookAt(nnChar.position.clone().add(new THREE.Vector3(0, 2, 0)));
                
                hnnCamera.position.copy(hnnChar.position).add(camOffset);
                hnnCamera.lookAt(hnnChar.position.clone().add(new THREE.Vector3(0, 2, 0)));
            }

            // 物理更新
            nnPhysics.update();
            hnnPhysics.update();

            // レンダリング
            nnRenderer.render(nnScene, nnCamera);
            hnnRenderer.render(hnnScene, hnnCamera);
        }

        init();
    </script>
</body>
</html>
